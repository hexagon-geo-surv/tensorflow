syntax = "proto3";

package xla.autotuner;

import "google/protobuf/duration.proto";
import "xla/backends/autotuner/backend_config.proto";
import "xla/backends/autotuner/backends.proto";

option java_outer_classname = "Autotuning";
option java_multiple_files = true;

// TODO(b/444398084): Make BackendConfig self sufficient and use it directly.
message Config {
  Backend backend = 1;
  BackendConfig backend_config = 2;
}

message AutotuneTargetKey {
  string device = 1;
  string explicit_version = 2;  // optional and user specified version, example:
                                // xla/jax release version.
  string hlo_fingerprint = 3;
}

message AutotuneEnvironmentKey {
  string codegen_version = 1;  // combined version of all codegen backends
  string codegen_options_fingerprint = 2;
}

message AutotuneKey {
  AutotuneTargetKey target = 1;  // always matched.
  AutotuneEnvironmentKey environment =
      2;  // only matched in strict matching mode.
}

message AutotuneValue {
  Config optimal_config = 1;
  string optimal_backend_version =
      2;  // should be matched in loose matching mode.
}

message AutotuneEntry {
  AutotuneKey key = 1;
  AutotuneValue value = 2;
}

// The device and explicit versions are currently used at cahce level as
// well as key in the cache key. It helps us experiment with different cache
// granularity, example: spanner database can handle all devices in one single
// cache well, while for directory based cache, we need to limit the granularity
// to a single device. We might not need different granularity and in that case
// we will deprecate the fields from either cache level or key level based on
// the best granularity we find.
message AutotuneCache {
  string device_scope = 1;  // Only specified if the cache is per-device.
  string explicit_version_scope =
      2;  // Only specified if the cache is per-version.
  repeated AutotuneEntry entries = 3;
}

message ConfigProfile {
  Config config = 1;
  google.protobuf.Duration run_time = 2;
  int64 scratch_bytes = 3;
}

message FailedConfigs {
  enum FailureKind {
    FAILURE_KIND_UNSPECIFIED = 0;
    COMPILATION_FAILED = 1;
    EXECUTION_FAILED = 2;
    REDZONE_CHECK_FAILED = 3;
    WRONG_RESULTS = 4;
  }
  Config config = 1;
  FailureKind kind = 2;
  string message = 3;
}

message InstructionRawConfigProfiles {
  string hlo_fingerprint = 1;
  repeated ConfigProfile config_profiles = 2;  // Used to create AutotuneCache.
  repeated FailedConfigs failed_configs = 3;   // For debugging.
  string hlo_text = 4;                         // For debugging.
}

message AllRawConfigProfiles {
  string device = 1;
  string explicit_version = 2;
  string codegen_version = 3;
  string codegen_options_fingerprint = 4;
  map<string, string> per_backend_versions =
      5;  // string representation of Backend enum mapped to version string.
  repeated InstructionRawConfigProfiles instruction_profiles = 6;
}
