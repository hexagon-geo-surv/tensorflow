name: Reusable Build
on:
  workflow_call:
    inputs:
      runner:
        description: 'Which runner should the workflow run on?'
        required: true
        type: string
      tfci:
        description: 'TFCI environment variable'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-test:
    if: contains(github.event.pull_request.body, 'WIP')
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
    container: ${{ (contains(inputs.runner, 'linux-x86') && 'us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest') ||
                   (contains(inputs.runner, 'linux-arm64') && 'us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build-arm64:latest') ||
                   (contains(inputs.runner, 'windows-x86') && null) }}
    timeout-minutes: 300
    steps:

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        env:
          GIT_CONFIG_PARAMETERS: "'checkout.workers=12' 'core.featureManyFiles=true'"
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
        
      - name: Setup Clang and MSVC environment
        if: ${{ contains(inputs.runner, 'windows-x86') }}
        # JAX handles Clang on Windows by relying on standard paths and environment variables.
        # We find the local installation of MSVC and LLVM and set the necessary environment variables
        # for Bazel's discovery mechanism (cc_configure).
        run: |
          $ErrorActionPreference = "Stop"
          
          $VS_PATH = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $VS_MSVC_DIR = Get-ChildItem -Directory -Path "$VS_PATH\VC\Tools\MSVC" | Select-Object -First 1 | ForEach-Object FullName
          
          # Visual Studio's LLVM toolset paths can vary slightly by version.
          # They generally follow: $VS_PATH\VC\Tools\Llvm\x64 or $VS_PATH\VC\Tools\Llvm\<version>\x64
          $VS_LLVM_DIR = Get-ChildItem -Directory -Path "$VS_PATH\VC\Tools\Llvm" -Recurse -Filter "x64" | Where-Object { $_.FullName -notmatch "ARM64" } | Select-Object -First 1 | ForEach-Object FullName
          
          if (-Not $VS_LLVM_DIR) {
            # Try to grab the root if x64 isn't explicitly defined as a subdirectory.
            $VS_LLVM_DIR = Get-ChildItem -Directory -Path "$VS_PATH\VC\Tools\Llvm" | Select-Object -First 1 | ForEach-Object FullName
          }

          if (-Not $VS_LLVM_DIR) {
            Write-Error "ERROR: Valid LLVM directory not found in Visual Studio installation at $VS_PATH\VC\Tools\Llvm!"
            exit 1
          }

          # Write to .bazelrc.user to avoid space parsing issues on the command line.
          # We use double quotes for values to handle spaces correctly.
          $bazelrc_user = ".bazelrc.user"
          $CLANG_CL_PATH = "$VS_LLVM_DIR\bin\clang-cl.exe"
          
          "build --repo_env=BAZEL_VC=""$VS_MSVC_DIR""" | Out-File -FilePath $bazelrc_user -Encoding ascii
          "build --repo_env=BAZEL_LLVM=""$VS_LLVM_DIR""" | Out-File -FilePath $bazelrc_user -Append -Encoding ascii
          "build --repo_env=CLANG_COMPILER_PATH=""$CLANG_CL_PATH""" | Out-File -FilePath $bazelrc_user -Append -Encoding ascii
          "build --repo_env=USE_CLANG_CL=1" | Out-File -FilePath $bazelrc_user -Append -Encoding ascii
          "build --repo_env=BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN=0" | Out-File -FilePath $bazelrc_user -Append -Encoding ascii
          "build --repo_env=CC=clang-cl" | Out-File -FilePath $bazelrc_user -Append -Encoding ascii
          "build --repo_env=CXX=clang-cl" | Out-File -FilePath $bazelrc_user -Append -Encoding ascii

          # Also set them in GITHUB_ENV for any other scripts
          echo "TFCI_BAZEL_VC=$VS_MSVC_DIR" >> $env:GITHUB_ENV
          echo "TFCI_BAZEL_LLVM=$VS_LLVM_DIR" >> $env:GITHUB_ENV
          echo "TFCI_USE_CLANG_CL=1" >> $env:GITHUB_ENV
          
          # Add LLVM bin to PATH
          echo "$VS_LLVM_DIR\bin" >> $env:GITHUB_PATH
          
          Write-Output "Environment configured in $bazelrc_user and GITHUB_ENV"
          Get-Content $bazelrc_user
        shell: powershell

      - name: Build and test
        env:
          TFCI: ${{ inputs.tfci }}
          TFCI_GITHUB_ACTIONS: true
        run: echo WIP present; ./ci/official/pycpp.sh
